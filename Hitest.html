<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For my beloved, Dylan</title>
  <style>
    body {
      font-family: 'Comic Sans MS', 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1c1c1c; /* Dark gray background */
      color: #fff; /* White text */
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .gif-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .gif-grid img {
      width: 150px;
      height: 150px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }
    .gif-grid img:hover {
      transform: scale(1.1);
    }
    .message {
      font-size: 1.8em;
      margin: 20px 0;
      color: #deb607;
    }
    .buttons {
      margin: 20px;
    }
    .buttons button {
      font-size: 1.2em;
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #deb607;
      color: #f9f9f6;
    }
    .buttons button:hover {
      background-color: #deb607;
    }
  </style>
</head>
<body>
  <div id="gif-grid" class="gif-grid">
     <img src="badtzmaru1.gif" alt="badtzmaru GIF 1">
    <img src="badtzmaru2.gif" alt="badtzmaru GIF 2">
    <img src="badtzmaru3.gif" alt="badtzmaru GIF 3">
    <img src="badtzmaru4.gif" alt="badtzmaru GIF 4">
  </div>
  <p id="message" class="message">Hi, open?</p>
  <div class="buttons">
    <button class="yes" onclick="openLetter()">Yes</button>
    <button class="no" onclick="showSad()">No</button>
  </div>

  <script>
    function openLetter() {
      window.location.href = "hello.html"; // Redirect to the letter page
    }

    function showSad() {
      const message = document.getElementById("message");
      const gifGrid = document.getElementById("gif-grid");

      // Change the message
      message.innerText = "please, baby?"; // Updated text
      message.style.color = "#deb607"; // Change message color to match the theme

      // Replace all GIFs with a sad image
      gifGrid.innerHTML = `
        <img src="badtzmaru-sad.gif" alt="Sad badtzmaru 1">
        <img src="badtzmaru-sad.gif" alt="Sad badtzmaru 2">
        <img src="badtzmaru-sad.gif" alt="Sad badtzmaru 3">
        <img src="badtzmaru-sad.gif" alt="Sad badtzmaru 4">
      `;

      // Add an "okay" button
      const okayButton = document.createElement('button');
      okayButton.innerText = "Okay";
      okayButton.style.fontSize = "1.2em";
      okayButton.style.padding = "10px 20px";
      okayButton.style.margin = "10px";
      okayButton.style.border = "none";
      okayButton.style.borderRadius = "5px";
      okayButton.style.cursor = "pointer";
      okayButton.style.backgroundColor = "#deb607";
      okayButton.style.color = "#f9f9f6";
      // Modify the "okay" button to redirect to "hello.html"
      okayButton.onclick = () => {
        window.location.href = "hello.html";
      };

      const buttonsDiv = document.querySelector('.buttons');
      buttonsDiv.innerHTML = ''; // Clear existing buttons
      buttonsDiv.appendChild(okayButton);
    }
  </script>
</body>
</html>
